<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Recipe Guide</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=1.0.1">
    <style>
        body {
            background-color: #f8f9fa;
            color: #333;
        }

        .admin-sidebar {
            background: #1c1917;
            min-height: 100vh;
            color: #fff;
            padding: 2rem 1rem;
        }

        .admin-main {
            padding: 2rem;
        }

        .recipe-list-item {
            background: #fff;
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .recipe-list-img {
            width: 50px;
            height: 50px;
            object-fit: contain;
            margin-right: 1rem;
        }

        .ingredient-row {
            background: #fdfdfd;
            /* border: 1px solid #eee; */
            border-radius: 8px;
            /* padding: 10px; */
            margin-bottom: 10px;
        }

        .btn-remove-row {
            color: #dc3545;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .btn-remove-row:hover {
            color: #a71d2a;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1c1917;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: #fff;
            padding: 2rem;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .nav-link {
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-link.active {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            color: var(--accent-color) !important;
        }

        /* Modal Refinement */
        .modal-content {
            border-radius: 15px;
            border: none;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .modal-header {
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
            border-radius: 15px 15px 0 0;
        }

        .modal-body {
            max-height: 80vh;
            overflow-y: auto;
            padding: 1.5rem;
        }

        .modal-footer {
            background: #f8f9fa;
            border-top: 1px solid #eee;
            border-radius: 0 0 15px 15px;
        }

        .form-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #666;
        }

        .section-title {
            font-size: 1rem;
            font-weight: 700;
            color: #1a1a1a;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 5px;
            margin-bottom: 15px;
            margin-top: 20px;
        }

        /* Scrollable Ingredients Table */
        .ingredients-scroll-wrapper {
            overflow-x: auto;
            border: 1px solid #eee;
            border-radius: 10px;
            background: #fff;
            padding: 15px;
            margin-bottom: 10px;
        }

        .ingredient-header-row, .ingredient-row {
            margin-left: 0 !important;
            margin-right: 0 !important;
            display: flex !important;
            align-items: center;
            width: 100%;
        }

        /* Custom Column Proportions - Dynamic Item Name */
        .ing-col-item {
            flex: 1;
            min-width: 220px;
            padding: 0 5px;
        }

        .ing-col-qty {
            flex: 0 0 11%;
            min-width: 70px;
            padding: 0 5px;
            text-align: center;
        }

        .ing-col-delete {
            flex: 0 0 50px;
            padding: 0 5px;
            text-align: center;
        }

        .ingredient-row {
            background: #fdfdfd;
            /* border: 1px solid #f0f0f0; */
            border-radius: 8px;
            /* padding: 8px; */
            margin-bottom: 8px;
            transition: all 0.2s;
        }

        .ingredient-row:hover {
            border-color: #d4a373;
            background: #fffdfb;
        }

        /* Premium Theme Buttons */
        .btn-theme-outline {
            background: #fff;
            color: #1c1917;
            border: 1px solid #d4c4b0;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .btn-theme-outline i {
            color: #d4a373;
        }

        .btn-theme-outline:hover {
            background: #d4a373;
            color: #fff !important;
            border-color: #d4a373;
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(212, 163, 115, 0.2);
        }

        .btn-theme-outline:hover i {
            color: #fff;
        }

        /* Custom Theme Loaders */
        .theme-loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .theme-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(212, 163, 115, 0.1);
            border-radius: 50%;
            border-top-color: #d4a373;
            animation: theme-spin 1s ease-in-out infinite;
        }

        @keyframes theme-spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            font-family: 'Playfair Display', serif;
            color: #d4a373;
            font-style: italic;
            margin-top: 1rem;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }

        .sidebar-logo {
            width: 120px;
            height: 120px;
            object-fit: contain;
            filter: brightness(0) invert(1);
            transition: all 0.3s ease;
        }

        /* Mobile Adjustments for Admin Panel */
        @media (max-width: 767.98px) {
            .sidebar-logo {
                width: 80px;
                height: 80px;
            }

            .admin-sidebar {
                position: fixed;
                top: 0;
                left: -260px;
                width: 260px;
                z-index: 2000;
                transition: all 0.3s ease;
                box-shadow: 10px 0 30px rgba(0, 0, 0, 0.5);
                display: block !important;
            }

            .admin-sidebar.show {
                left: 0;
            }

            .admin-main {
                padding: 1rem;
                padding-top: 5rem;
            }

            .admin-mobile-header {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                background: #1c1917;
                padding: 1rem;
                z-index: 1000;
                display: flex !important;
                justify-content: space-between;
                align-items: center;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            }

            .sidebar-overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.5);
                z-index: 1050;
                display: none;
            }

            .sidebar-overlay.show {
                display: block;
            }
        }

        @media (max-width: 576px) {
            .admin-main {
                padding: 1rem;
                padding-top: 5rem;
            }

            .admin-header h2 {
                font-size: 1.25rem;
            }

            .btn-theme-outline {
                font-size: 0.7rem;
                padding: 0.4rem 0.75rem;
                border-radius: 8px;
            }

            .admin-header {
                margin-bottom: 1.5rem;
            }
        }
    </style>
</head>

<body>

    <!-- Mobile Header -->
    <div class="admin-mobile-header d-none">
        <h4 class="mb-0 text-white" style="font-family: 'Playfair Display', serif;">Dashboard</h4>
        <button id="mobile-sidebar-toggle" class="btn text-white p-0">
            <i class="fa fa-bars fa-lg"></i>
        </button>
    </div>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Simple Login Overlay -->
    <div id="login-overlay">
        <div class="login-box">
            <h2 class="mb-4" style="font-family: 'Playfair Display', serif; color: #1c1917;">Admin Access</h2>
            <input type="password" id="admin-pass" class="form-control mb-3" placeholder="Enter Password"
                style="border-radius: 10px; padding: 0.75rem;">
            <button id="login-btn" class="btn-theme-outline w-100 justify-content-center"
                style="padding: 0.75rem; font-size: 1rem;">Login</button>
        </div>
    </div>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 admin-sidebar d-none d-md-block">
                <div class="mb-4 text-center">
                    <img src="images/logo.webp" alt="Logo" class="sidebar-logo">
                </div>
                <ul class="nav flex-column">
                    <li class="nav-item mb-2">
                        <a href="index.html" class="nav-link text-white"><i class="fa fa-external-link-alt me-2"></i>
                            View Site</a>
                    </li>
                    <li class="nav-item mb-2">
                        <a href="#" class="nav-link text-white active" id="nav-recipes">
                            <i class="fa fa-list me-2"></i> Recipes
                        </a>
                    </li>
                    <li class="nav-item mb-2">
                        <a href="#" class="nav-link text-white" id="nav-categories">
                            <i class="fa fa-tags me-2"></i> Categories
                        </a>
                    </li>
                    <li class="nav-item mt-4">
                        <hr class="bg-secondary">
                        <a href="#" class="nav-link text-danger" id="btn-logout">
                            <i class="fa fa-sign-out-alt me-2"></i> Logout
                        </a>
                    </li>
                </ul>
            </nav>

            <!-- Main Content -->
            <main class="col-md-9 col-lg-10 admin-main">

                <!-- Recipes Section -->
                <div id="section-recipes">
                    <div class="admin-header">
                        <h2>Manage Recipes</h2>
                        <button class="btn-theme-outline" onclick="openRecipeEditor()">
                            <i class="fa fa-plus me-2"></i> Add New Recipe
                        </button>
                    </div>
                    <div id="recipe-list">
                        <div class="theme-loader-container">
                            <div class="theme-spinner"></div>
                            <div class="loading-text">Loading recipes...</div>
                        </div>
                    </div>
                </div>

                <!-- Categories Section -->
                <div id="section-categories" class="d-none">
                    <div class="admin-header">
                        <h2>Manage Categories</h2>
                        <button class="btn-theme-outline" onclick="openCategoryEditor()">
                            <i class="fa fa-plus me-2"></i> Add New Category
                        </button>
                    </div>
                    <div id="category-list">
                        <div class="theme-loader-container">
                            <div class="theme-spinner"></div>
                            <div class="loading-text">Loading categories...</div>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <!-- Optimized Recipe Editor Modal -->
    <div class="modal fade" id="recipeEditorModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Recipe Editor</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="recipe-form">
                        <input type="hidden" id="recipe-id">

                        <div class="section-title">Basic Information</div>
                        <div class="row mb-3">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Recipe Name</label>
                                <input type="text" id="recipe-name" class="form-control" required
                                    placeholder="e.g. Coconut Cloud">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Category</label>
                                <select id="recipe-category" class="form-select"></select>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-bold">Recipe Image</label>
                                <div class="d-flex gap-2 align-items-center mb-2">
                                    <img id="recipe-img-preview" src="https://placehold.co/80x80?text=No+Image"
                                        style="width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd;">
                                    <div class="flex-grow-1">
                                        <input type="file" id="recipe-image-file" class="form-control" accept="image/*">
                                        <input type="hidden" id="recipe-image">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="section-title">Ingredients</div>
                        <div class="mb-3">
                            <div class="ingredients-scroll-wrapper">
                                <div class="ingredient-header-row mb-2 text-muted fw-bold"
                                    style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px;">
                                    <div class="ing-col-item">Item Name</div>
                                    <div class="ing-col-qty">0%</div>
                                    <div class="ing-col-qty">25%</div>
                                    <div class="ing-col-qty">50%</div>
                                    <div class="ing-col-qty">Reg</div>
                                    <div class="ing-col-qty">Extra</div>
                                    <div class="ing-col-delete"></div>
                                </div>
                                <div id="ingredients-container">
                                    <!-- Dynamic rows go here -->
                                </div>
                            </div>
                            <button type="button" class="btn btn-sm btn-outline-success mt-1"
                                onclick="addIngredientRow()">
                                <i class="fa fa-plus me-1"></i> Add Ingredient
                            </button>
                        </div>

                        <div class="section-title">Final Steps</div>
                        <div class="mb-3">
                            <div id="steps-container">
                                <!-- Dynamic step rows go here -->
                            </div>
                            <button type="button" class="btn btn-sm btn-outline-success mt-1" onclick="addStepRow()">
                                <i class="fa fa-plus me-1"></i> Add Step
                            </button>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-link text-muted me-auto"
                        data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn-theme-outline px-4" id="btn-save-recipe">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Category Editor Modal -->
    <div class="modal fade" id="categoryEditorModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Category Editor</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="category-form">
                        <input type="hidden" id="category-id">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Category Name</label>
                            <input type="text" id="category-name-field" class="form-control" required
                                placeholder="e.g. Coffee">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Category Image</label>
                            <div class="d-flex gap-2 align-items-center mb-2">
                                <img id="category-img-preview" src="https://placehold.co/80x80?text=No+Image"
                                    style="width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd;">
                                <div class="flex-grow-1">
                                    <input type="file" id="category-image-file" class="form-control" accept="image/*">
                                    <input type="hidden" id="category-image">
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"
                        style="border-radius: 10px;">Cancel</button>
                    <button type="button" class="btn-theme-outline" id="btn-save-category">Save Category</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/admin.js?v=1.0.1"></script>
</body>

</html>
