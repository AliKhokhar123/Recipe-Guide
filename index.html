<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Guide - Staff Training</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Small adjustment for demo mode */
        .demo-banner {
            background: #ffc107;
            color: #000;
            text-align: center;
            padding: 5px;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <header class="main-header">
        <div class="container-fluid d-flex align-items-center">
            <div class="col-4 text-start">
                <span class="staff-training-label">Staff Training</span>
            </div>
            <div class="col-4 text-center">
                <h1 class="brand-title">
                    <img src="images/logo.webp" alt="Recipe Guide" class="brand-logo">
                </h1>
            </div>
            <div class="col-4 text-end">
                <span class="in-store-badge">IN-STORE USE</span>
            </div>
        </div>
    </header>

    <section class="filters-container">
        <div id="category-pills" class="d-flex">
            <!-- Dynamically populated categories -->
            <a href="#" class="filter-pill active" data-category="all">
                All <span class="count">3</span>
            </a>
            <a href="#" class="filter-pill" data-category="1">
                Coffee <span class="count">1</span>
            </a>
            <a href="#" class="filter-pill" data-category="2">
                Tea <span class="count">1</span>
            </a>
            <a href="#" class="filter-pill" data-category="3">
                Bakery <span class="count">1</span>
            </a>
        </div>
    </section>

    <section class="search-container">
        <div class="container-fluid d-flex align-items-center gap-3">
            <div class="search-input-group flex-grow-1">
                <i class="fa fa-search"></i>
                <input type="text" id="recipe-search" placeholder="Search drinks...">
            </div>
            <div class="selection-toggle-container">
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="selection-mode-toggle">
                    <label class="form-check-label text-dark fw-bold" for="selection-mode-toggle" style="font-size: 0.8rem; white-space: nowrap;">Multi-Select</label>
                </div>
            </div>
        </div>
    </section>

    <main class="recipe-grid container-fluid">
        <div id="recipe-container" class="row">
            <!-- Dynamically populated recipes via app.js -->
        </div>
    </main>

    <!-- Floating Action Bar for Selection -->
    <div id="selection-action-bar" class="selection-bar d-none">
        <div class="selected-info">
            <span id="selected-count">0</span> items selected
        </div>
        <div class="action-buttons">
            <button id="clear-selection" class="btn btn-clear">Clear</button>
            <button id="view-selected" class="btn btn-view-bulk">View Recipes</button>
        </div>
    </div>

    <!-- Recipe Detail Modal -->
    <div class="modal fade" id="recipeModal" tabindex="-1" aria-labelledby="recipeModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="recipeModalLabel"></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body" id="modal-content-body">
                    <!-- Content populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
